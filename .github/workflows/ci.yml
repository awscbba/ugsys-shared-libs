name: CI

on:
  push:
    branches: [feature/**, fix/**, develop]
    paths-ignore: ["*.md", ".gitignore"]
  pull_request:
    branches: [main]
    paths-ignore: ["*.md", ".gitignore"]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ============================================================
  # Detect which packages changed
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auth_client: ${{ steps.filter.outputs.auth_client }}
      logging_lib: ${{ steps.filter.outputs.logging_lib }}
      event_lib:   ${{ steps.filter.outputs.event_lib }}
      testing_lib: ${{ steps.filter.outputs.testing_lib }}
      any_code:    ${{ steps.filter.outputs.any_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          echo "Changed files: $CHANGED"
          echo "auth_client=$(echo "$CHANGED" | grep -q '^auth-client/'  && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "logging_lib=$(echo "$CHANGED" | grep -q '^logging-lib/'  && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "event_lib=$(echo "$CHANGED"   | grep -q '^event-lib/'    && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "testing_lib=$(echo "$CHANGED" | grep -q '^testing-lib/'  && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "any_code=$(echo "$CHANGED"    | grep -qE '\.(py|toml|yml|yaml)$' && echo true || echo false)" >> $GITHUB_OUTPUT

  # ============================================================
  # Lint + test each changed package
  # ============================================================
  lint-and-test:
    name: Lint & Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      needs.changes.outputs.auth_client == 'true' ||
      needs.changes.outputs.logging_lib == 'true' ||
      needs.changes.outputs.event_lib   == 'true' ||
      needs.changes.outputs.testing_lib == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: [auth-client, logging-lib, event-lib, testing-lib]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync deps
        run: uv sync --directory ${{ matrix.package }} --extra dev

      - name: Resolve source directory
        id: srcdir
        run: |
          PKG="${{ matrix.package }}"
          if [ -d "$PKG/src" ]; then
            echo "dir=$PKG/src" >> $GITHUB_OUTPUT
          else
            DIR=$(find "$PKG" -maxdepth 1 -mindepth 1 -type d \
              ! -name '.*' ! -name 'tests' ! -name '__pycache__' \
              ! -name '.venv' ! -name '.pytest_cache' ! -name '.ruff_cache' \
              | head -1)
            echo "dir=$DIR" >> $GITHUB_OUTPUT
          fi

      - name: Ruff lint
        run: uv run --directory ${{ matrix.package }} --extra dev ruff check ${{ steps.srcdir.outputs.dir }}/

      - name: Ruff format check
        run: uv run --directory ${{ matrix.package }} --extra dev ruff format --check ${{ steps.srcdir.outputs.dir }}/

      - name: Run tests
        run: uv run --directory ${{ matrix.package }} --extra dev pytest tests/ -v --tb=short

  # ============================================================
  # Security scanning (PRs only)
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.any_code == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Bandit SAST
        continue-on-error: true
        run: |
          uv tool install bandit
          for pkg in auth-client logging-lib event-lib testing-lib; do
            echo "=== $pkg ==="
            if [ -d "$pkg/src" ]; then
              src="$pkg/src"
            else
              src=$(find "$pkg" -maxdepth 1 -mindepth 1 -type d \
                ! -name '.*' ! -name 'tests' ! -name '__pycache__' \
                ! -name '.venv' ! -name '.pytest_cache' ! -name '.ruff_cache' \
                | head -1)
            fi
            uv tool run bandit -r "$src/" -ll -ii || true
          done

      - name: pip-audit SCA
        continue-on-error: true
        run: |
          uv tool install pip-audit
          for pkg in auth-client logging-lib event-lib testing-lib; do
            uv export --directory $pkg --no-hashes --no-dev --frozen \
              > /tmp/$pkg-reqs.txt 2>/dev/null || true
            uv tool run pip-audit -r /tmp/$pkg-reqs.txt || true
          done

      - name: Gitleaks secret scan
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Slack notification on failure
  # ============================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-test, security]
    if: failure() && github.event_name == 'pull_request'
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ CI Failed — ugsys-shared-libs", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch:*\n${{ github.head_ref }}"},
                    {"type": "mrkdwn", "text": "*PR:*\n#${{ github.event.pull_request.number }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Run"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
