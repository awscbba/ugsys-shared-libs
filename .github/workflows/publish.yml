name: Publish — Build & Release

# Triggered by tags like: auth-client/v0.2.0  logging-lib/v1.0.0
# Or manually via workflow_dispatch with a tag input.
# Consumers install via git source (no PyPI registry needed):
#   uv add "ugsys-auth-client @ git+https://github.com/awscbba/ugsys-shared-libs@auth-client/v0.1.0#subdirectory=auth-client"
on:
  push:
    tags:
      - "auth-client/v*"
      - "logging-lib/v*"
      - "event-lib/v*"
      - "testing-lib/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. auth-client/v0.2.2)"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.13"

jobs:
  resolve:
    name: Resolve Package
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.parse.outputs.package }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PKG="${TAG%%/v*}"
          VER="${TAG#*/v}"
          echo "tag=$TAG"       >> $GITHUB_OUTPUT
          echo "package=$PKG"   >> $GITHUB_OUTPUT
          echo "version=$VER"   >> $GITHUB_OUTPUT

      - name: Validate tag format
        run: |
          TAG="${{ steps.parse.outputs.tag }}"
          if [[ ! "$TAG" =~ ^(auth-client|logging-lib|event-lib|testing-lib)/v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format: $TAG (expected: <package>/v<semver>)"
            exit 1
          fi

  create-tag:
    name: Create Tag (dispatch only)
    runs-on: ubuntu-latest
    needs: [resolve]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping creation"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          fi

  ci-gate:
    name: CI Gate (${{ needs.resolve.outputs.package }})
    runs-on: ubuntu-latest
    needs: [resolve, create-tag]
    if: always() && needs.resolve.result == 'success' && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Resolve source directory
        id: srcdir
        run: |
          PKG="${{ needs.resolve.outputs.package }}"
          if [ -d "$PKG/src" ]; then
            echo "dir=src" >> $GITHUB_OUTPUT
          else
            DIR=$(find "$PKG" -maxdepth 1 -mindepth 1 -type d \
              ! -name '.*' ! -name 'tests' ! -name '__pycache__' \
              ! -name '.venv' ! -name '.pytest_cache' ! -name '.ruff_cache' \
              | head -1 | xargs basename)
            echo "dir=$DIR" >> $GITHUB_OUTPUT
          fi
      - run: uv run --directory ${{ needs.resolve.outputs.package }} --extra dev ruff check ${{ steps.srcdir.outputs.dir }}/
      - run: uv run --directory ${{ needs.resolve.outputs.package }} --extra dev ruff format --check ${{ steps.srcdir.outputs.dir }}/
      - run: uv run --directory ${{ needs.resolve.outputs.package }} --extra dev pytest tests/ -v --tb=short

  build:
    name: Build (${{ needs.resolve.outputs.package }})
    runs-on: ubuntu-latest
    needs: [resolve, ci-gate]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Build wheel + sdist
        working-directory: ${{ needs.resolve.outputs.package }}
        run: |
          uv tool install hatch
          uv tool run hatch build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.resolve.outputs.package }}
          path: ${{ needs.resolve.outputs.package }}/dist/
          retention-days: 30

  release:
    name: GitHub Release (${{ needs.resolve.outputs.package }})
    runs-on: ubuntu-latest
    needs: [resolve, build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.resolve.outputs.package }}
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          PKG="${{ needs.resolve.outputs.package }}"
          VER="${{ needs.resolve.outputs.version }}"
          PREV_TAG=$(git tag --list "${PKG}/v*" --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" -- "${PKG}/" | head -30)
          else
            NOTES="Initial release of ${PKG} v${VER}"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo ""
            echo "## Install (uv git source)"
            echo '```toml'
            echo "# In consumer pyproject.toml"
            echo "[tool.uv.sources]"
            echo "ugsys-${PKG} = { git = \"https://github.com/awscbba/ugsys-shared-libs\", tag = \"${PKG}/v${VER}\", subdirectory = \"${PKG}\" }"
            echo '```'
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: "${{ needs.resolve.outputs.package }} v${{ needs.resolve.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.version, 'rc') || contains(needs.resolve.outputs.version, 'alpha') || contains(needs.resolve.outputs.version, 'beta') }}
